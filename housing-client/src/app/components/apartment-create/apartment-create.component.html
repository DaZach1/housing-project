<div class="container mt-4">
    <h2>Create New Apartment</h2>
    <form (ngSubmit)="createApartment()">
      <div class="row mb-3">
        <h4>Basic Info</h4>
        <div class="col-md-4">
          <label class="form-label">Number</label>
          <input type="number" class="form-control" [(ngModel)]="newApartment.number" name="number" required min="1">
        </div>
        <div class="col-md-4">
          <label class="form-label">Floor</label>
          <input type="number" class="form-control" [(ngModel)]="newApartment.floor" name="floor" required min="0">
        </div>
        <div class="col-md-4">
          <label class="form-label">Rooms</label>
          <input type="number" class="form-control" [(ngModel)]="newApartment.roomCount" name="roomCount" required min="1">
        </div>
      </div>
  
      <div class="row mb-3">
        <h4>Area</h4>
        <div class="col-md-6">
          <label class="form-label">Total Area (m²)</label>
          <input type="number" step="0.01" class="form-control" [(ngModel)]="newApartment.totalArea" name="totalArea" required min="0">
        </div>
        <div class="col-md-6">
          <label class="form-label">Living Area (m²)</label>
          <input type="number" step="0.01" class="form-control" [(ngModel)]="newApartment.livingArea" name="livingArea" required min="0">
        </div>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Residents Count</label>
        <input type="number" class="form-control" [(ngModel)]="newApartment.population" name="population" required min="0">
      </div>
  
      <input type="hidden" [(ngModel)]="newApartment.houseId" name="houseId">
  
      <button type="submit" class="btn btn-primary">Create Apartment</button>
      <button type="button" (click)="cancel()" class="btn btn-outline-secondary ms-2">
        Cancel
      </button>
    </form>
  </div>
