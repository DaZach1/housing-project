<div class="container mt-4">
    <h2>Create New House</h2>
    <form (ngSubmit)="createHouse()">
      <div class="mb-3">
        <label class="form-label">Street</label>
        <input type="text" class="form-control" [(ngModel)]="newHouse.street" name="street" required>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Number</label>
          <input type="number" class="form-control" [(ngModel)]="newHouse.number" name="number" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Postal Code</label>
          <input type="text" class="form-control" [(ngModel)]="newHouse.postalCode" name="postalCode" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">City</label>
          <input type="text" class="form-control" [(ngModel)]="newHouse.city" name="city" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Country</label>
          <input type="text" class="form-control" [(ngModel)]="newHouse.country" name="country" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Create House</button>
      <button [routerLink]="['/all-houses']" class="btn btn-outline-secondary ms-2">
        Cancel
      </button>
    </form>
  </div>
